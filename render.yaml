services:
  - type: web
    name: cleanupconnect-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cleanupconnect-db
          property: connectionString

databases:
  - name: cleanupconnect-db
    plan: free