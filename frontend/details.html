<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details | CleanUpConnect</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav id="navbar" class="site-nav" aria-label="Main navigation"></nav>
  <main id="details-container">
    <!-- Event details will be loaded here -->
  </main>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="navbar.js"></script>
  <script src="theme.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (window.Auth && window.Auth.isLoggedIn()) {
        try {
          currentUser = await window.Auth.fetchProfile();
        } catch (error) {
          currentUser = null;
        }
      }

      loadDetails();
    });

    async function loadDetails() {
      try {
        const eventResponse = await fetch(`http://localhost:5000/events/${id}`);
        const event = await eventResponse.json();
        const volunteersResponse = await fetch(`http://localhost:5000/events/${id}/volunteers`);
        const volunteers = await volunteersResponse.json();
        const container = document.getElementById('details-container');
        const cityDisplay = event.city.charAt(0).toUpperCase() + event.city.slice(1);
        const stateDisplay = event.state.charAt(0).toUpperCase() + event.state.slice(1);
        const isCompleted = Boolean(event.is_completed);
        const canComplete = currentUser && currentUser.role === 'admin' && !isCompleted;
        
        container.innerHTML = `
          <div class="event-card">
            <h2>${event.title}</h2>
            <p><strong>Status:</strong> <span class="event-status ${isCompleted ? 'completed' : 'open'}">${isCompleted ? 'Completed' : 'Open'}</span></p>
            <p>${event.description}</p>
            <p><strong>Location:</strong> ${cityDisplay}, ${stateDisplay}</p>
            <p><strong>Date:</strong> ${new Date(event.date).toLocaleString()}</p>
            <p><strong>Volunteers Needed:</strong> ${event.volunteers_needed}</p>
            <p><strong>Organizer:</strong> ${event.organizer_username || 'Unknown'}</p>
            ${isCompleted ? `<p><strong>Completed By:</strong> ${event.completed_by_username || 'Admin'}</p>` : ''}
            <h3>Volunteers (${volunteers.length}):</h3>
            <ul>
              ${volunteers.map(v => `<li>${v.username} (joined ${new Date(v.joined_at).toLocaleString()})</li>`).join('')}
            </ul>
            <div class="card-actions">
              <button type="button" id="join-btn" class="btn ${isCompleted ? 'btn-completed' : ''}" ${isCompleted ? 'disabled' : ''}>${isCompleted ? 'Event Completed' : 'Join Event'}</button>
              ${canComplete ? '<button type="button" id="complete-btn" class="btn btn-ghost">Mark Complete</button>' : ''}
            </div>
          </div>
        `;

        const joinBtn = document.getElementById('join-btn');
        if (joinBtn) {
          joinBtn.addEventListener('click', async () => {
            if (!window.Auth || !window.Auth.isLoggedIn()) {
              alert('Please login first to join an event.');
              window.location.href = 'login.html';
              return;
            }

            try {
              const response = await fetch(`http://localhost:5000/events/${id}/join`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${window.Auth.getToken()}`,
                },
              });

              const payload = await response.json().catch(() => ({}));

              if (response.status === 401) {
                window.Auth.clearToken();
                alert('Session expired. Please login again.');
                window.location.href = 'login.html';
                return;
              }

              if (!response.ok) {
                alert(payload.error || 'Unable to join this event.');
                return;
              }

              loadDetails();
            } catch (error) {
              console.error('Error joining event:', error);
            }
          });
        }

        const completeBtn = document.getElementById('complete-btn');
        if (completeBtn) {
          completeBtn.addEventListener('click', async () => {
            if (!window.Auth || !window.Auth.isLoggedIn()) {
              alert('Please login first.');
              window.location.href = 'login.html';
              return;
            }

            try {
              const response = await fetch(`http://localhost:5000/events/${id}/complete`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${window.Auth.getToken()}`,
                },
              });

              const payload = await response.json().catch(() => ({}));

              if (response.status === 401) {
                window.Auth.clearToken();
                alert('Session expired. Please login again.');
                window.location.href = 'login.html';
                return;
              }

              if (!response.ok) {
                alert(payload.error || 'Unable to complete this event.');
                return;
              }

              alert('Event marked complete. Points have been awarded.');
              loadDetails();
            } catch (error) {
              console.error('Error completing event:', error);
            }
          });
        }
      } catch (error) {
        console.error('Error loading details:', error);
      }
    }
  </script>
</body>
</html>
