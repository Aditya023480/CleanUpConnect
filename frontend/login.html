<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CleanUpConnect</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav id="navbar" class="site-nav" aria-label="Main navigation"></nav>

  <main>
    <form id="login-form" class="auth-form">
      <h2>Login</h2>
      <p class="form-copy">Use your email or username to continue.</p>

      <label for="identifier">Email or Username</label>
      <input type="text" id="identifier" required>

      <label for="password">Password</label>
      <input type="password" id="password" required>

      <button type="submit" class="btn">Login</button>
      <p id="login-message" class="form-message" aria-live="polite"></p>
      <p class="auth-meta">No account yet? <a href="register.html">Register</a></p>
    </form>
  </main>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="navbar.js"></script>
  <script src="theme.js"></script>
  <script>
    const loginForm = document.getElementById('login-form');
    const loginMessage = document.getElementById('login-message');

    function setMessage(message, type) {
      loginMessage.textContent = message;
      loginMessage.className = `form-message ${type}`;
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        setMessage('Please enter both fields.', 'error');
        return;
      }

      try {
        const response = await fetch(window.CleanupConnectAPI.url('/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          setMessage(data.error || 'Invalid credentials.', 'error');
          return;
        }

        window.Auth.setToken(data.token);
        setMessage('Login successful. Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = 'events.html';
        }, 700);
      } catch (error) {
        setMessage('Unable to connect to server.', 'error');
      }
    });
  </script>
</body>
</html>
