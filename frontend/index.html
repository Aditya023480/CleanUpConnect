<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Cleaning</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Community Cleaning Platform</h1>
      <p class="hero-copy">Find local cleanup events in your area.</p>
    </div>
    <div class="header-actions">
      <button type="button" id="theme-toggle" class="btn btn-ghost">Switch to Dark</button>
      <a href="create.html" class="btn">Create Event</a>
    </div>
  </header>
  <nav id="navbar" class="site-nav" aria-label="Main navigation"></nav>
  <section class="filters" aria-label="Event filters">
    <div class="filter-group" id="state-filter-group">
      <label for="state-select">Filter by State</label>
      <select id="state-select"></select>
    </div>
    <div class="filter-group" id="city-filter-group">
      <label for="city-select">Filter by City</label>
      <select id="city-select" disabled></select>
    </div>
  </section>
  <main id="events-container">
    <!-- Events will be loaded here -->
  </main>
  <section id="pagination-controls" class="pagination-controls" aria-label="Event list pagination"></section>
  <script src="auth.js"></script>
  <script src="navbar.js"></script>
  <script src="theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
